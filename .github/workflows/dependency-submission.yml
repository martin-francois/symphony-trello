name: Dependency Submission

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - 'pom.xml'
      - '.github/workflows/dependency-submission.yml'
      - '.mvn/jvm.config'

permissions: read-all

jobs:
  dependency-submission:
    if: >-
      ${{ !startsWith(github.head_ref, 'release-please--branches--')
      && github.head_ref != 'renovate/openrewrite-toolchain'
      && !startsWith(github.head_ref, 'automation/openrewrite/renovate-') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
      - name: Submit Dependencies
        uses: advanced-security/maven-dependency-submission-action@b275d12641ac2d2108b2cbb7598b154ad2f2cee8 # v5.0.0
