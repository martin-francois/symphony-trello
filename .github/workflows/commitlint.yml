name: Commitlint

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, edited]

permissions: read-all

jobs:
  commitlint:
    if: ${{ !startsWith(github.head_ref, 'release-please--branches--') }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.11.0 --activate
      - name: Prepare commitlint
        # commitlint resolves `extends` from the config file's directory. Keep a
        # runner-local config copy next to the installed packages instead of
        # adding a package.json to this Java repository.
        run: |
          set -euo pipefail
          COMMITLINT_HOME="$RUNNER_TEMP/commitlint"
          mkdir -p "$COMMITLINT_HOME"
          printf '{"private":true}\n' > "$COMMITLINT_HOME/package.json"
          cp commitlint.config.cjs "$COMMITLINT_HOME/commitlint.config.cjs"
          cp commitlint.message.config.cjs "$COMMITLINT_HOME/commitlint.message.config.cjs"
          pnpm --dir "$COMMITLINT_HOME" add --silent \
            @commitlint/cli@21.2.1 \
            @commitlint/config-conventional@21.2.0
          echo "COMMITLINT_BIN=$COMMITLINT_HOME/node_modules/.bin/commitlint" >> "$GITHUB_ENV"
          echo "COMMITLINT_TITLE_CONFIG=$COMMITLINT_HOME/commitlint.config.cjs" >> "$GITHUB_ENV"
          echo "COMMITLINT_MESSAGE_CONFIG=$COMMITLINT_HOME/commitlint.message.config.cjs" >> "$GITHUB_ENV"
      - name: Lint pull request title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          printf '%s\n' "$PR_TITLE" | "$COMMITLINT_BIN" --config "$COMMITLINT_TITLE_CONFIG"
      - name: Check compatibility metadata
        if: ${{ !endsWith(github.actor, '[bot]') }}
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: node scripts/check-pr-compatibility-metadata.ts
      - name: Lint pull request commits
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          "$COMMITLINT_BIN" --config "$COMMITLINT_MESSAGE_CONFIG" \
            --from "$PR_BASE_SHA" --to "$PR_HEAD_SHA" --verbose
