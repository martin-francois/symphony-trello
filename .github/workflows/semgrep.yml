name: Semgrep

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  semgrep:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Run selected Semgrep rules
        run: ./scripts/semgrep-docker.sh
