name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions: read-all

jobs:
  lint:
    if: ${{ !startsWith(github.head_ref, 'release-please--branches--') }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25 # v24
      - name: Installer shell syntax
        run: |
          bash -n \
            install.sh \
            uninstall.sh \
            scripts/betterleaks-docker.sh \
            scripts/package-release-assets.sh \
            scripts/check-private-context
      - name: Install shell lint tooling
        run: sudo apt-get update && sudo apt-get install -y shellcheck shfmt
      - name: Installer shell lint
        run: |
          shellcheck \
            install.sh \
            uninstall.sh \
            scripts/betterleaks-docker.sh \
            scripts/package-release-assets.sh \
            scripts/check-private-context
          shfmt -d \
            install.sh \
            uninstall.sh \
            scripts/betterleaks-docker.sh \
            scripts/package-release-assets.sh \
            scripts/check-private-context

  renovate:
    if: ${{ !startsWith(github.head_ref, 'release-please--branches--') }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.13.1 --activate
      - name: Validate Renovate config
        run: pnpm dlx --package renovate renovate-config-validator renovate.json

  script-tests:
    if: ${{ !startsWith(github.head_ref, 'release-please--branches--') }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.13.1 --activate
      - name: Install script tooling
        run: pnpm install --frozen-lockfile
      - name: Type-check and test scripts
        run: pnpm run verify:scripts

  test:
    # ADR 0048 keeps this job on 2 vCPU and matches hosted JUnit parallelism
    # to the runner's vCPU count to minimize normalized Blacksmith cost.
    if: ${{ !startsWith(github.head_ref, 'release-please--branches--') }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    env:
      ISOLATE_OPENREWRITE: >-
        ${{ github.event_name == 'pull_request'
        && (github.head_ref == 'renovate/openrewrite-toolchain'
        || startsWith(github.head_ref, 'automation/openrewrite/renovate-')) }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        if: ${{ env.ISOLATE_OPENREWRITE != 'true' }}
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
      - name: Apply curated OpenRewrite recipes
        if: ${{ env.ISOLATE_OPENREWRITE != 'true' }}
        run: ./mvnw -Popenrewrite rewrite:run
      - name: Apply Spotless formatting
        if: ${{ env.ISOLATE_OPENREWRITE != 'true' }}
        run: ./mvnw spotless:apply
      - name: Verify the generated maintenance state is committed
        if: ${{ env.ISOLATE_OPENREWRITE != 'true' }}
        run: |
          if [[ -n "$(git status --porcelain=v1 --untracked-files=all)" ]]; then
            git status --short
            git diff HEAD
            exit 1
          fi
      - name: Test and coverage, including fuzz, chaos, and installer lifecycle
        if: ${{ env.ISOLATE_OPENREWRITE != 'true' }}
        run: ./mvnw -Djunit.parallel.enabled=true -Djunit.parallel.config.fixed.parallelism=2 spotless:check verify
      - name: Test the OpenRewrite update in isolation
        if: ${{ env.ISOLATE_OPENREWRITE == 'true' }}
        env:
          OPENREWRITE_IMAGE: >-
            docker.io/library/maven:3.9.11-eclipse-temurin-25@sha256:407c4423cec0cf2981055bc2c6c0dc211d9605b6669279b95997f2d1c7e91e2c
        run: |
          set -euo pipefail
          container_cache="$RUNNER_TEMP/openrewrite-ci-container-cache"
          mkdir -p "$container_cache/home/.m2" "$container_cache/m2"
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --env HOME=/cache/home \
            --env GIT_OPTIONAL_LOCKS=0 \
            --env MAVEN_CONFIG=/cache/home/.m2 \
            --env "MAVEN_OPTS=-Duser.home=/cache/home -Dmaven.repo.local=/cache/m2" \
            --volume "$PWD:/workspace" \
            --volume "$PWD/.git:/workspace/.git:ro" \
            --volume "$container_cache:/cache" \
            --workdir /workspace \
            --entrypoint bash \
            "$OPENREWRITE_IMAGE" \
            -euo pipefail -c '
              ./mvnw -Popenrewrite rewrite:run
              ./mvnw spotless:apply
              if [[ -n "$(git status --porcelain=v1 --untracked-files=all)" ]]; then
                git status --short
                git diff HEAD
                exit 1
              fi
              ./mvnw \
                -Djunit.parallel.enabled=true \
                -Djunit.parallel.config.fixed.parallelism=2 \
                spotless:check \
                verify
            '

  windows-powershell:
    if: ${{ !startsWith(github.head_ref, 'release-please--branches--') }}
    runs-on: blacksmith-2vcpu-windows-2025
    env:
      ISOLATE_OPENREWRITE: >-
        ${{ github.event_name == 'pull_request'
        && (github.head_ref == 'renovate/openrewrite-toolchain'
        || startsWith(github.head_ref, 'automation/openrewrite/renovate-')) }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
      - name: PowerShell installer dry runs
        shell: pwsh
        run: |
          .\install.ps1 --dry-run --no-onboard
          .\uninstall.ps1 --dry-run --yes
      - name: PowerShell static analysis
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer)) {
            Install-Module PSScriptAnalyzer -Scope CurrentUser -Force -Repository PSGallery
          }
          $ignoredRules = @(
            "PSAvoidUsingInvokeExpression",
            "PSAvoidUsingWriteHost",
            "PSReviewUnusedParameter",
            "PSUseApprovedVerbs",
            "PSUseShouldProcessForStateChangingFunctions",
            "PSUseSingularNouns"
          )
          $results = @(
            foreach ($script in @("install.ps1", "uninstall.ps1")) {
              Invoke-ScriptAnalyzer -Path $script -Severity Warning,Error
            }
          )
          $results = @($results | Where-Object { $ignoredRules -notcontains $_.RuleName })
          if ($results.Count -gt 0) {
            $results | Format-Table -AutoSize | Out-String | Write-Host
            exit 1
          }
      - name: PowerShell installer option tests
        if: ${{ env.ISOLATE_OPENREWRITE != 'true' }}
        run: .\mvnw.cmd -q '-Djunit.parallel.enabled=false' '-Dtest=InstallerScriptTest#*powershell*+*powerShell*' test
      - name: Diagnostics tool probe tests
        if: ${{ env.ISOLATE_OPENREWRITE != 'true' }}
        run: .\mvnw.cmd -q '-Djunit.parallel.enabled=false' '-Dtest=SetupDiagnosticReporterTest#' test
      - name: PowerShell generated-wrapper lifecycle
        if: ${{ env.ISOLATE_OPENREWRITE != 'true' }}
        run: .\mvnw.cmd -q '-Djunit.parallel.enabled=false' -Dtest=InstallerScriptLifecycleTest#powershellInstallerLifecycleInstallsStartsStopsAndUninstallsWithFakeJavaOnWindows test
