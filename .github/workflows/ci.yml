name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: deploy/ansible/requirements-lint.txt
      - name: Install Ansible lint tooling
        run: python -m pip install --disable-pip-version-check -r deploy/ansible/requirements-lint.txt
      - name: Install Ansible collections
        run: ansible-galaxy collection install -r deploy/ansible/requirements.yml
      - name: Ansible syntax check
        run: ansible-playbook -i deploy/ansible/inventory.example.yml deploy/ansible/site.yml --syntax-check
      - name: Ansible lint
        run: ansible-lint deploy/ansible

  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.2 --activate
      - name: Validate Renovate config
        run: pnpm dlx --package renovate renovate-config-validator renovate.json

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
      - name: Formatting
        run: ./mvnw spotless:check
      - name: Test and coverage
        run: ./mvnw verify
