name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23
      - name: Installer shell syntax
        run: |
          bash -n install.sh
          bash -n uninstall.sh
      - name: Install shell lint tooling
        run: sudo apt-get update && sudo apt-get install -y shellcheck shfmt
      - name: Installer shell lint
        run: |
          shellcheck install.sh uninstall.sh
          shfmt -d install.sh uninstall.sh
      - name: PowerShell script smoke and analysis
        run: |
          ./scripts/pwsh-docker.sh -NoProfile -File ./install.ps1 --dry-run --no-onboard
          ./scripts/pwsh-docker.sh -NoProfile -File ./uninstall.ps1 --dry-run --yes
          ./scripts/pwsh-docker.sh -NoProfile -Command '
            $ErrorActionPreference = "Stop"
            if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer)) {
              Install-Module PSScriptAnalyzer -Scope CurrentUser -Force -Repository PSGallery
            }
            $ignoredRules = @(
              "PSAvoidUsingInvokeExpression",
              "PSAvoidUsingWriteHost",
              "PSReviewUnusedParameter",
              "PSUseApprovedVerbs",
              "PSUseShouldProcessForStateChangingFunctions",
              "PSUseSingularNouns"
            )
            $results = @(
              foreach ($script in @("install.ps1", "uninstall.ps1")) {
                Invoke-ScriptAnalyzer -Path $script -Severity Warning,Error
              }
            )
            $results = @($results | Where-Object { $ignoredRules -notcontains $_.RuleName })
            if ($results.Count -gt 0) {
              $results | Format-Table -AutoSize | Out-String | Write-Host
              exit 1
            }
          '
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: deploy/ansible/requirements-lint.txt
      - name: Install Ansible lint tooling
        run: python -m pip install --disable-pip-version-check -r deploy/ansible/requirements-lint.txt
      - name: Install Ansible collections
        run: ansible-galaxy collection install -r deploy/ansible/requirements.yml
      - name: Ansible syntax check
        run: ansible-playbook -i deploy/ansible/inventory.example.yml deploy/ansible/site.yml --syntax-check
      - name: Ansible lint
        run: ansible-lint deploy/ansible

  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.0.9 --activate
      - name: Validate Renovate config
        run: pnpm dlx --package renovate renovate-config-validator renovate.json

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
      - name: Pull PowerShell test image
        run: docker pull mcr.microsoft.com/dotnet/sdk:8.0
      - name: Formatting
        run: ./mvnw spotless:check
      - name: Test and coverage, including installer lifecycle
        env:
          SYMPHONY_TRELLO_TEST_PWSH: ./scripts/pwsh-docker.sh
        run: ./mvnw verify

  windows-powershell:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
      - name: PowerShell generated-wrapper lifecycle
        run: .\mvnw.cmd -q -Dtest=InstallerScriptLifecycleTest#powershellInstallerLifecycleInstallsStartsStopsAndUninstallsWithFakeJavaOnWindows test
