name: Feature request
description: Suggest a change to product behavior, setup, docs, or operations.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem should this solve?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Trello workflow
        - Local installer or onboarding
        - Codex runtime
        - GitHub integration
        - Deployment
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Describe the solution you want
      description: Describe the behavior, docs, or workflow you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: List simpler or narrower options if you considered them.
  - type: textarea
    id: workaround
    attributes:
      label: Current workaround
      description: If there is a workaround today, describe it and why it is clumsy or incomplete.
  - type: dropdown
    id: compatibility-decision
    attributes:
      label: Compatibility or breaking-change decision
      description: >-
        Contract changes default to breaking unless this issue deliberately chooses compatibility.
      options:
        - Breaking change is acceptable; document the migration path
        - Compatible change with temporary migration or legacy support
        - Permanent compatibility contract
        - No user-facing contract change expected
        - Needs maintainer decision before implementation
  - type: textarea
    id: migration-path
    attributes:
      label: Migration path or compatibility cleanup
      description: >-
        If breaking, explain why the break is necessary and how users/operators move to the new
        contract; the squash commit body or retained commit must carry that guidance in a BREAKING
        CHANGE footer for the changelog. If compatible, define when the migration logic is removed
        and where cleanup is tracked. If permanent compatibility is requested, name the SPEC or ADR
        home. If no contract change, write N/A.
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add examples, screenshots, workflow snippets, or links that clarify the request.
  - type: checkboxes
    id: ai-assistance
    attributes:
      label: AI Assistance (if used)
      description: If an AI agent helped prepare this request, mark the relevant boxes. Otherwise leave this blank.
      options:
        - label: AI-assisted issue
          required: false
        - label: I confirm I understand and reviewed this request
          required: false
  - type: textarea
    id: ai-context
    attributes:
      label: AI prompts / session logs (optional)
      description: Add redacted prompts or session excerpts if they help reviewers understand the request.
      render: text
