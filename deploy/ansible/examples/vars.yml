---
symphony_trello_workflows:
  - name: project-a
    src: "{{ playbook_dir }}/../../WORKFLOW.project-a.md"
  - name: project-b
    src: "{{ playbook_dir }}/../../WORKFLOW.project-b.md"

# Leave this unset when Java and Codex are already on the service user's normal systemd PATH.
# Set it when they are installed in custom directories.
# symphony_trello_service_path: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/opt/java/bin:/opt/codex/bin

# Leave this empty for the secure default. Add concrete host files or folders only when deployed
# cards should let Codex read and write paths outside /var/lib/symphony-trello. The playbook updates
# both systemd path access and Codex sandbox writable roots. This is a list, so multiple paths are
# supported.
# symphony_trello_allowed_project_roots:
#   - /srv/projects/example
#   - /srv/shared/input.txt

# Less strict Codex sandbox inside the still-restricted systemd namespace. Use this when you expose a
# parent directory and Codex's workspaceWrite sandbox cannot use it cleanly.
# symphony_trello_codex_danger_full_access: true

# Less secure: expose the host filesystem broadly to Codex sessions run by the service.
# symphony_trello_allow_host_filesystem: true

# Optional supplementary OS groups for the service user. For example, add docker only when workflow
# cards intentionally need Docker daemon access through the host socket.
# symphony_trello_extra_groups:
#   - docker

# By default, the playbook copies the Codex CLI auth from the user running Ansible:
# ~/.codex/auth.json
# Set this only when your existing Codex auth file is somewhere else.
# symphony_trello_codex_auth_src: /path/to/existing/.codex/auth.json

# By default, the playbook copies the GitHub CLI auth from the user running Ansible:
# ~/.config/gh/hosts.yml
# Set this only when your existing GitHub CLI auth file is somewhere else.
# symphony_trello_github_hosts_src: /path/to/existing/.config/gh/hosts.yml
