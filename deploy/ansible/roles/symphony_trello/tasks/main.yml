---
- name: Validate required deployment variables
  ansible.builtin.assert:
    that:
      - symphony_trello_trello_api_key is defined
      - symphony_trello_trello_api_key | length > 0
      - symphony_trello_trello_api_token is defined
      - symphony_trello_trello_api_token | length > 0
      - symphony_trello_workflows is defined
      - symphony_trello_allowed_project_roots is iterable
      - symphony_trello_allowed_project_roots is not string
    fail_msg: >
      Define symphony_trello_trello_api_key and symphony_trello_trello_api_token in an Ansible Vault
      file, and define symphony_trello_workflows in group_vars.

- name: Validate allowed project roots
  ansible.builtin.assert:
    that:
      - item is match('^/')
      - item != '/'
      - item is not search('[\\s":]')
    fail_msg: >
      symphony_trello_allowed_project_roots entries must be absolute paths below a concrete project
      directory and must not contain whitespace, double quotes, or colons. Use
      symphony_trello_allow_host_filesystem only when you intentionally accept broad host filesystem
      access.
  loop: "{{ symphony_trello_allowed_project_roots }}"
  loop_control:
    label: configured project root

- name: Calculate local build input fingerprint
  ansible.builtin.command:
    argv:
      - "{{ ansible_playbook_python }}"
      - -c
      - |
        import hashlib
        import json
        import pathlib
        import sys

        root = pathlib.Path(sys.argv[1]).resolve()
        input_paths = json.loads(sys.argv[2])
        files = []

        for input_path in input_paths:
            path = root / input_path
            if path.is_file():
                files.append(path)
            elif path.is_dir():
                files.extend(candidate for candidate in path.rglob("*") if candidate.is_file())

        digest = hashlib.sha256()
        for path in sorted(files, key=lambda candidate: candidate.relative_to(root).as_posix()):
            relative_path = path.relative_to(root).as_posix()
            mode = path.stat().st_mode & 0o777
            digest.update(relative_path.encode())
            digest.update(b"\0")
            digest.update(oct(mode).encode())
            digest.update(b"\0")
            digest.update(path.read_bytes())
            digest.update(b"\0")

        print(digest.hexdigest())
      - "{{ symphony_trello_project_root }}"
      - "{{ symphony_trello_build_input_paths | to_json }}"
  delegate_to: localhost
  become: false
  changed_when: false
  register: symphony_trello_build_input_fingerprint

- name: Check local packaged app
  ansible.builtin.stat:
    path: "{{ symphony_trello_app_src }}/quarkus-run.jar"
  delegate_to: localhost
  become: false
  register: symphony_trello_local_runner

- name: Check local build fingerprint stamp
  ansible.builtin.stat:
    path: "{{ symphony_trello_build_fingerprint_path }}"
  delegate_to: localhost
  become: false
  register: symphony_trello_build_fingerprint_stamp_file

- name: Read local build fingerprint stamp
  ansible.builtin.slurp:
    src: "{{ symphony_trello_build_fingerprint_path }}"
  delegate_to: localhost
  become: false
  when: symphony_trello_build_fingerprint_stamp_file.stat.exists
  register: symphony_trello_build_fingerprint_stamp

- name: Calculate whether local package is stale
  ansible.builtin.set_fact:
    symphony_trello_should_package_app: >-
      {{ (not symphony_trello_local_runner.stat.exists)
          or (not symphony_trello_build_fingerprint_stamp_file.stat.exists)
          or ((symphony_trello_build_fingerprint_stamp.content | default('') | b64decode | trim)
              != symphony_trello_build_input_fingerprint.stdout) }}

- name: Package app when build inputs changed
  ansible.builtin.command:
    argv: "{{ [symphony_trello_maven_executable] + symphony_trello_maven_arguments }}"
    chdir: "{{ symphony_trello_project_root }}"
  delegate_to: localhost
  become: false
  when: symphony_trello_should_package_app
  changed_when: true

- name: Store local build fingerprint stamp
  ansible.builtin.copy:
    dest: "{{ symphony_trello_build_fingerprint_path }}"
    content: "{{ symphony_trello_build_input_fingerprint.stdout }}\n"
    mode: "0644"
  delegate_to: localhost
  become: false
  when: symphony_trello_should_package_app

- name: Validate local packaged app exists
  ansible.builtin.stat:
    path: "{{ symphony_trello_app_src }}/quarkus-run.jar"
  delegate_to: localhost
  become: false
  register: symphony_trello_packaged_runner

- name: Stop when packaging did not produce the app
  ansible.builtin.assert:
    that:
      - symphony_trello_packaged_runner.stat.exists
    fail_msg: "Maven packaging did not produce {{ symphony_trello_app_src }}/quarkus-run.jar."

- name: Validate local workflow files exist
  ansible.builtin.stat:
    path: "{{ item.src }}"
  loop: "{{ symphony_trello_workflows }}"
  loop_control:
    label: "{{ item.name }}"
  delegate_to: localhost
  become: false
  register: symphony_trello_local_workflow_files

- name: Stop when a configured workflow file is missing
  ansible.builtin.assert:
    that:
      - item.stat.exists
    fail_msg: "Workflow {{ item.item.name }} points to missing local file {{ item.item.src }}."
  loop: "{{ symphony_trello_local_workflow_files.results }}"
  loop_control:
    label: "{{ item.item.name }}"

- name: Create service group
  ansible.builtin.group:
    name: "{{ symphony_trello_group }}"
    system: true

- name: Create service user
  ansible.builtin.user:
    name: "{{ symphony_trello_user }}"
    group: "{{ symphony_trello_group }}"
    system: true
    create_home: true
    home: "{{ symphony_trello_state_dir }}"
    shell: /usr/sbin/nologin

- name: Create install and config directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ symphony_trello_opt_dir }}"
      owner: root
      group: root
      mode: "0755"
    - path: "{{ symphony_trello_config_dir }}"
      owner: root
      group: root
      mode: "0755"
    - path: "{{ symphony_trello_secret_dir }}"
      owner: root
      group: root
      mode: "0700"
    - path: "{{ symphony_trello_workflow_dir }}"
      owner: root
      group: "{{ symphony_trello_group }}"
      mode: "0750"
    - path: "{{ symphony_trello_state_dir }}"
      owner: "{{ symphony_trello_user }}"
      group: "{{ symphony_trello_group }}"
      mode: "0750"
  loop_control:
    label: "{{ item.path }}"

- name: Check controller Codex auth file
  ansible.builtin.stat:
    path: "{{ symphony_trello_codex_auth_src }}"
  delegate_to: localhost
  become: false
  when: symphony_trello_manage_codex_auth
  register: symphony_trello_controller_codex_auth

- name: Stop when controller Codex auth is missing
  ansible.builtin.assert:
    that:
      - symphony_trello_controller_codex_auth.stat.exists
      - symphony_trello_controller_codex_auth.stat.size > 0
    fail_msg: >
      Codex auth file {{ symphony_trello_codex_auth_src }} is missing or empty. Run codex login on
      the machine where you run Ansible, set symphony_trello_codex_auth_src to the existing Codex
      auth file, or set symphony_trello_manage_codex_auth to false when the service user is already
      authenticated on the target server.
  when: symphony_trello_manage_codex_auth

- name: Create Codex config directory
  ansible.builtin.file:
    path: "{{ symphony_trello_codex_config_dir }}"
    state: directory
    owner: "{{ symphony_trello_user }}"
    group: "{{ symphony_trello_group }}"
    mode: "0700"
  when: symphony_trello_manage_codex_auth

- name: Deploy Codex auth file
  ansible.builtin.copy:
    src: "{{ symphony_trello_codex_auth_src }}"
    dest: "{{ symphony_trello_codex_config_dir }}/auth.json"
    owner: "{{ symphony_trello_user }}"
    group: "{{ symphony_trello_group }}"
    mode: "0600"
  no_log: true
  when: symphony_trello_manage_codex_auth
  register: symphony_trello_codex_auth_file

- name: Deploy Trello credential files
  ansible.builtin.copy:
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: "0600"
    content: "{{ item.value }}"
  loop:
    - dest: "{{ symphony_trello_secret_dir }}/trello-api-key"
      value: "{{ symphony_trello_trello_api_key }}"
    - dest: "{{ symphony_trello_secret_dir }}/trello-api-token"
      value: "{{ symphony_trello_trello_api_token }}"
  loop_control:
    label: "{{ item.dest }}"
  no_log: true
  register: symphony_trello_secret_files

- name: Deploy service environment file
  ansible.builtin.copy:
    dest: "{{ symphony_trello_config_dir }}/service.env"
    owner: root
    group: root
    mode: "0644"
    content: |
      {% if symphony_trello_service_path is defined %}
      PATH="{{ symphony_trello_service_path | replace('\\', '\\\\') | replace('"', '\\"') }}"
      {% endif %}
      {% if symphony_trello_allowed_project_roots | length > 0 %}
      SYMPHONY_CODEX_ADDITIONAL_WRITABLE_ROOTS="{{ symphony_trello_allowed_project_roots | join(':') }}"
      {% endif %}
      {% if symphony_trello_allow_host_filesystem or symphony_trello_codex_danger_full_access %}
      SYMPHONY_CODEX_DANGER_FULL_ACCESS=true
      {% endif %}
  when: >
    symphony_trello_service_path is defined
    or (symphony_trello_allowed_project_roots | length > 0)
    or symphony_trello_codex_danger_full_access
    or symphony_trello_allow_host_filesystem
  register: symphony_trello_env_file

- name: Remove service environment file when no service environment is configured
  ansible.builtin.file:
    path: "{{ symphony_trello_config_dir }}/service.env"
    state: absent
  when: >
    symphony_trello_service_path is not defined
    and (symphony_trello_allowed_project_roots | length == 0)
    and not symphony_trello_codex_danger_full_access
    and not symphony_trello_allow_host_filesystem
  register: symphony_trello_env_file_removed

- name: Remove legacy environment file that could contain old secrets
  ansible.builtin.file:
    path: "{{ symphony_trello_config_dir }}/env"
    state: absent
  register: symphony_trello_legacy_env_file_removed

- name: Deploy systemd unit template
  ansible.builtin.copy:
    src: "{{ symphony_trello_unit_src }}"
    dest: /etc/systemd/system/symphony-trello@.service
    owner: root
    group: root
    mode: "0644"
  register: symphony_trello_unit_file
  notify: Reload systemd

- name: Create systemd drop-in directory
  ansible.builtin.file:
    path: /etc/systemd/system/symphony-trello@.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: symphony_trello_allow_host_filesystem or (symphony_trello_allowed_project_roots | length > 0)

- name: Deploy project access systemd drop-in
  ansible.builtin.template:
    src: project-roots.conf.j2
    dest: /etc/systemd/system/symphony-trello@.service.d/10-project-roots.conf
    owner: root
    group: root
    mode: "0644"
  when: symphony_trello_allow_host_filesystem or (symphony_trello_allowed_project_roots | length > 0)
  register: symphony_trello_project_roots_dropin
  notify: Reload systemd

- name: Remove project access systemd drop-in
  ansible.builtin.file:
    path: /etc/systemd/system/symphony-trello@.service.d/10-project-roots.conf
    state: absent
  when: not symphony_trello_allow_host_filesystem and (symphony_trello_allowed_project_roots | length == 0)
  register: symphony_trello_project_roots_dropin_removed
  notify: Reload systemd

- name: Apply pending systemd reload before service changes
  ansible.builtin.meta: flush_handlers

- name: Sync packaged app
  ansible.posix.synchronize:
    src: "{{ symphony_trello_app_src }}/"
    dest: "{{ symphony_trello_app_dir }}/"
    archive: true
    delete: true
    rsync_path: "sudo rsync"
  become: false
  register: symphony_trello_app_sync

- name: Ensure packaged app ownership
  ansible.builtin.file:
    path: "{{ symphony_trello_app_dir }}"
    state: directory
    owner: root
    group: root
    recurse: true

- name: Deploy workflow files
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ symphony_trello_workflow_dir }}/{{ item.name }}.WORKFLOW.md"
    owner: root
    group: "{{ symphony_trello_group }}"
    mode: "0640"
  loop: "{{ symphony_trello_workflows }}"
  loop_control:
    label: "{{ item.name }}"
  register: symphony_trello_workflow_copy

- name: Find deployed workflow files
  ansible.builtin.find:
    paths: "{{ symphony_trello_workflow_dir }}"
    patterns: "*.WORKFLOW.md"
    file_type: file
  register: symphony_trello_deployed_workflows

- name: Calculate managed and deployed workflow names
  ansible.builtin.set_fact:
    symphony_trello_managed_workflow_names: "{{ symphony_trello_workflows | map(attribute='name') | list }}"
    symphony_trello_deployed_workflow_names: >-
      {{ symphony_trello_deployed_workflows.files
          | map(attribute='path')
          | map('basename')
          | map('regex_replace', '\.WORKFLOW\.md$', '')
          | list }}

- name: Stop and disable removed workflow services
  ansible.builtin.systemd_service:
    name: "symphony-trello@{{ item }}"
    state: stopped
    enabled: false
  loop: "{{ symphony_trello_deployed_workflow_names | difference(symphony_trello_managed_workflow_names) }}"
  when: symphony_trello_remove_unmanaged_workflows

- name: Remove unmanaged workflow files
  ansible.builtin.file:
    path: "{{ symphony_trello_workflow_dir }}/{{ item }}.WORKFLOW.md"
    state: absent
  loop: "{{ symphony_trello_deployed_workflow_names | difference(symphony_trello_managed_workflow_names) }}"
  when: symphony_trello_remove_unmanaged_workflows

- name: Calculate whether managed services need restart
  ansible.builtin.set_fact:
    symphony_trello_restart_services: >-
      {{ (symphony_trello_env_file.changed | default(false))
          or (symphony_trello_env_file_removed.changed | default(false))
          or symphony_trello_legacy_env_file_removed.changed
          or (symphony_trello_secret_files.results | selectattr('changed') | list | length > 0)
          or (symphony_trello_codex_auth_file.changed | default(false))
          or symphony_trello_unit_file.changed
          or (symphony_trello_project_roots_dropin.changed | default(false))
          or (symphony_trello_project_roots_dropin_removed.changed | default(false))
          or symphony_trello_app_sync.changed
          or (symphony_trello_workflow_copy.results | selectattr('changed') | list | length > 0) }}

- name: Enable and start managed workflow services
  ansible.builtin.systemd_service:
    name: "symphony-trello@{{ item }}"
    state: started
    enabled: true
  loop: "{{ symphony_trello_managed_workflow_names }}"

- name: Restart managed workflow services after changed inputs
  ansible.builtin.systemd_service:
    name: "symphony-trello@{{ item }}"
    state: restarted
    enabled: true
  loop: "{{ symphony_trello_managed_workflow_names }}"
  when: symphony_trello_restart_services
